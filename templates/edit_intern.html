{% extends "base.html" %}
{% block title %}Edit Intern{% endblock %}
{% block extra_css %}
<style>
  body { background: #f0f2f5; }
  .sidebar { width: 260px; min-height: 100vh; background: linear-gradient(180deg,#1a1a2e,#16213e); position: fixed; top: 0; left: 0; z-index: 100; }
  .sidebar .brand { padding: 24px 20px 16px; border-bottom: 1px solid rgba(255,255,255,.1); }
  .sidebar .nav-link { color: rgba(255,255,255,.7); padding: 10px 20px; border-radius: 8px; margin: 2px 10px; transition: all .2s; }
  .sidebar .nav-link:hover, .sidebar .nav-link.active { background: rgba(233,69,96,.18); color: #e94560; }
  .main { margin-left: 260px; padding: 24px; }
  .topbar { background: white; border-radius: 12px; padding: 14px 24px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
  .form-card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
  .range-val { font-weight: 600; color: #e94560; min-width: 32px; text-align: right; }
</style>
{% endblock %}
{% block body %}
<nav class="sidebar d-flex flex-column">
  <div class="brand">
    <div class="d-flex align-items-center gap-2">
      <i class="bi bi-people-fill text-danger fs-4"></i>
      <div><div class="text-white fw-bold">InternMS</div><div class="text-white-50" style="font-size:.72rem">HR Management</div></div>
    </div>
  </div>
  <ul class="nav flex-column mt-3 flex-grow-1">
    <li class="nav-item"><a class="nav-link" href="/dashboard"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
    <li class="nav-item"><a class="nav-link" href="/add_intern"><i class="bi bi-person-plus me-2"></i>Add Intern</a></li>
    <li class="nav-item"><a class="nav-link active" href="/manage_interns"><i class="bi bi-people me-2"></i>Manage Interns</a></li>
    <li class="nav-item"><a class="nav-link" href="/reports"><i class="bi bi-bar-chart me-2"></i>Reports</a></li>
    <li class="nav-item mt-auto"><a class="nav-link" href="/change_hr_password"><i class="bi bi-key me-2"></i>Change Password</a></li>
    <li class="nav-item"><a class="nav-link text-danger" href="/logout"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
  </ul>
</nav>

<div class="main">
  <div class="topbar d-flex justify-content-between align-items-center">
    <h5 class="mb-0 fw-bold"><i class="bi bi-pencil-square me-2 text-danger"></i>Edit Intern — {{ intern.name }}</h5>
    <a href="/manage_interns" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Back</a>
  </div>

  <div class="card form-card">
    <div class="card-body p-4">
      <form method="POST" action="/edit_intern/{{ intern.id }}">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label fw-semibold">Full Name</label>
            <input type="text" name="name" class="form-control" value="{{ intern.name }}" required/>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Department</label>
            <select name="department" class="form-select" required>
              {% for dept in ['Computer Science and Engineering (CSE)','Artificial Intelligence and Machine Learning (AI & ML)','Data Science','Information Technology (IT)','Computer Applications (BCA)','Master of Computer Applications (MCA)','Statistics','Mathematics','Data Analytics','Business Analytics','Educational Technology','Education Department','Psychology','Sociology','Economics','Management Studies','Commerce','Operations Research','Artificial Intelligence','Software Engineering','Information Systems','Computational Science','Digital Learning and Analytics','Educational Data Mining','Learning Sciences','Predictive Analytics','Full Stack Development','Cybersecurity','Cloud Computing','UI/UX Design','DevOps','Mobile Development','Backend Development','Frontend Development','Machine Learning','Blockchain','IoT','Game Development','Quality Assurance','Digital Marketing','Product Management','Network Engineering','Database Administration','B.Sc. Computer Science','B.Sc. Information Technology','B.Sc. Artificial Intelligence & Data Science','B.Sc. Data Science','B.Sc. Mathematics','B.Sc. Physics','B.Sc. Chemistry','B.Sc. Zoology','B.Sc. Botany','B.Sc. Biotechnology','B.Sc. Microbiology','B.Com.','B.Com. CA (Computer Applications)','B.Com. Accounting & Finance','BBA (Business Administration)','BA English Literature','BA Tamil Literature','BA History','BA Economics','BA Sociology','BSW (Social Work)','BCA (Computer Applications)','B.Sc. Psychology','B.Sc. Visual Communication','M.Sc. Computer Science','M.Sc. Information Technology','M.Sc. Data Science','M.Sc. Artificial Intelligence','M.Sc. Mathematics','M.Sc. Physics','M.Sc. Chemistry','M.Sc. Biotechnology','M.Sc. Microbiology','M.Com.','MBA (Master of Business Administration)','MA English Literature','MA Tamil Literature','MA History','MA Economics','MA Sociology','MSW (Master of Social Work)','MCA (Master of Computer Applications)','M.Sc. Psychology','M.Sc. Visual Communication'] %}
              <option {% if intern.department == dept %}selected{% endif %}>{{ dept }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Domain</label>
            <select name="domain" class="form-select" required>
              {% for dom in ['Full Stack','AI & ML','Data Analytics','Machine Learning','Finance','AWS DevOps','Cybersecurity','UI/UX Design','Cloud Computing','Mobile Development','Python Development','Data Science','Web Development','Backend Development','Frontend Development','Software Engineering','Artificial Intelligence','Business Analytics','Predictive Analytics','Digital Marketing','Product Management','Network Engineering','Database Administration','IoT','Blockchain','Game Development','Quality Assurance','DevOps','Information Systems'] %}
              <option {% if intern.domain == dom %}selected{% endif %}>{{ dom }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold d-flex justify-content-between">
              Attendance (%) <span class="range-val" id="attVal">{{ intern.attendance }}</span>
            </label>
            <input type="range" name="attendance" class="form-range" min="0" max="100" step="1" value="{{ intern.attendance }}"
              oninput="document.getElementById('attVal').textContent=this.value"/>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold d-flex justify-content-between">
              Tasks Completed (0–20) <span class="range-val" id="taskVal">{{ intern.tasks }}</span>
            </label>
            <input type="range" name="tasks" class="form-range" min="0" max="20" step="1" value="{{ intern.tasks }}"
              oninput="document.getElementById('taskVal').textContent=this.value"/>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold d-flex justify-content-between">
              Communication Score (0–10) <span class="range-val" id="projScoreVal">{{ intern.communication }}</span>
            </label>
            <input type="range" name="communication" class="form-range" min="0" max="10" step="0.5" value="{{ intern.communication }}"
              oninput="document.getElementById('projScoreVal').textContent=this.value"/>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold d-flex justify-content-between">
              Project Score (0–100) <span class="range-val" id="projVal">{{ intern.project }}</span>
            </label>
            <input type="range" name="project" class="form-range" min="0" max="100" step="1" value="{{ intern.project }}"
              oninput="document.getElementById('projVal').textContent=this.value"/>
          </div>
        </div>
        <div class="mt-4 d-flex gap-2">
          <button type="submit" class="btn btn-danger px-4"><i class="bi bi-check-lg me-1"></i>Save Changes</button>
          <a href="/manage_interns" class="btn btn-outline-secondary px-4">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
